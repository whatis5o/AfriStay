<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriStay — You're Offline</title>
<link rel="icon" type="image/x-icon" href="/Pictures/favicon.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Inter,sans-serif;background:#fff8f6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;}
  .wrap{max-width:420px;}
  .icon{font-size:64px;margin-bottom:24px;}
  h1{font-size:24px;font-weight:800;color:#1a1a1a;margin-bottom:10px;}
  p{font-size:15px;color:#666;line-height:1.6;margin-bottom:28px;}
  .btn{display:inline-block;padding:14px 32px;background:#EB6753;color:#fff;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;cursor:pointer;border:none;}
  .btn:hover{background:#d45742;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🌍</div>
  <h1>You're Offline</h1>
  <p>No internet connection right now. Check your connection and try again — AfriStay will be waiting!</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
