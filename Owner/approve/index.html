<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing… — AfriStay</title>
  <link rel="icon" type="image/x-icon" href="/Pictures/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f2f0ec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid #f0f0f0;
      border-top-color: #EB6753;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 22px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 20px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
    .sub   { font-size: 14px; color: #888; line-height: 1.7; }
    .logo  { margin-top: 28px; font-size: 13px; color: #bbb; }
    .logo a { color: #EB6753; text-decoration: none; font-weight: 600; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #EB6753;
      color: #fff;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Processing…</div>
  <p class="sub" id="sub">Please wait a moment.</p>
  <div class="logo">AfriStay · <a href="/">afristay.rw</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
(async function () {
  const p         = new URLSearchParams(window.location.search);
  const bookingId = p.get('token') || p.get('booking') || '';
  const action    = p.get('action') || 'approve'; // approve | reject

  const titleEl   = document.getElementById('title');
  const subEl     = document.getElementById('sub');
  const spinnerEl = document.getElementById('spinner');
  const card      = document.getElementById('card');

  function setDone(icon, title, msg, showDashBtn) {
    spinnerEl.style.display = 'none';
    const ic = document.createElement('div');
    ic.textContent = icon;
    ic.style.cssText = 'font-size:52px;margin-bottom:16px';
    card.insertBefore(ic, titleEl);
    titleEl.textContent = title;
    subEl.textContent   = msg;
    if (showDashBtn) {
      const btn = document.createElement('a');
      btn.href = '/Dashboard';
      btn.className = 'btn';
      btn.textContent = 'Go to Dashboard';
      card.appendChild(btn);
    } else {
      setTimeout(() => window.location.replace('/Dashboard'), 2800);
    }
  }

  if (!bookingId) {
    setDone('❌', 'Invalid Link', 'No booking ID found. Please use the link from your email.', true);
    return;
  }

  // Wait for supabase client
  let sb = window.supabaseClient;
  if (!sb) {
    await new Promise(r => setTimeout(r, 400));
    sb = window.supabaseClient;
  }
  if (!sb) {
    setDone('❌', 'Configuration Error', 'Could not connect to the database. Please try again later.', true);
    return;
  }

  // Check login
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    // Redirect to auth, come back here after login
    window.location.href = '/Auth/?redirect=' + encodeURIComponent(window.location.href);
    return;
  }

  // Step 1 — fetch this user's listing IDs (owner_id = current user)
  const { data: ownedListings } = await sb
    .from('listings')
    .select('id, title')
    .eq('owner_id', user.id);

  const ownedIds = (ownedListings || []).map(l => l.id);

  if (!ownedIds.length) {
    setDone('🔒', 'Not Authorized', 'You have no listings associated with this account.', true);
    return;
  }

  // Step 2 — fetch the booking, confirming it belongs to one of the owner's listings
  const { data: booking, error: bErr } = await sb
    .from('bookings')
    .select('id, status, listing_id')
    .eq('id', bookingId)
    .in('listing_id', ownedIds)
    .maybeSingle();

  if (bErr || !booking) {
    setDone('❌', 'Booking Not Found', 'This booking does not exist, already expired, or does not belong to your listings.', true);
    return;
  }

  if (booking.status === 'confirmed' || booking.status === 'rejected') {
    const already = booking.status === 'confirmed' ? 'already approved' : 'already rejected';
    setDone('ℹ️', 'Already Processed', 'This booking was ' + already + '.', true);
    return;
  }

  // Apply the action
  const newStatus = action === 'reject' ? 'rejected' : 'confirmed';
  const { error: upErr } = await sb
    .from('bookings')
    .update({ status: newStatus })
    .eq('id', bookingId);

  if (upErr) {
    setDone('❌', 'Update Failed', upErr.message || 'Could not update the booking. Please try from the Dashboard.', true);
    return;
  }

  if (action === 'reject') {
    setDone('✅', 'Booking Rejected', 'The booking has been rejected. Redirecting to Dashboard…');
  } else {
    setDone('✅', 'Booking Approved!', 'The booking is now confirmed. Redirecting to Dashboard…');
  }
})();
</script>
</body>
</html>
