<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing… — AfriStay</title>
  <link rel="icon" type="image/x-icon" href="/Pictures/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f2f0ec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid #f0f0f0;
      border-top-color: #EB6753;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 22px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 20px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
    .sub   { font-size: 14px; color: #888; line-height: 1.7; }
    .logo  { margin-top: 28px; font-size: 13px; color: #bbb; }
    .logo a { color: #EB6753; text-decoration: none; font-weight: 600; }

    /* Success/Error states */
    .icon-ok  { font-size: 52px; margin-bottom: 16px; color: #16a34a; }
    .icon-err { font-size: 52px; margin-bottom: 16px; color: #ef4444; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Processing…</div>
  <p class="sub" id="sub">Please wait a moment.</p>
  <div class="logo">AfriStay · <a href="/">afristay.rw</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
(async function () {
  const p      = new URLSearchParams(window.location.search);
  const token  = p.get('token')  || '';
  const action = p.get('action') || 'approve'; // approve | reject

  const titleEl   = document.getElementById('title');
  const subEl     = document.getElementById('sub');
  const spinnerEl = document.getElementById('spinner');

  function setDone(icon, title, msg) {
    spinnerEl.style.display = 'none';
    const ic = document.createElement('div');
    ic.textContent = icon;
    ic.style.cssText = 'font-size:52px;margin-bottom:16px';
    document.getElementById('card').insertBefore(ic, titleEl);
    titleEl.textContent = title;
    subEl.textContent   = msg;
    setTimeout(() => window.location.replace('/'), 2400);
  }

  if (!token) {
    setDone('❌', 'Invalid Link', 'No token found. Please use the link from your email.');
    return;
  }

  try {
    // Call the approve-booking edge function which handles token-based auth
    const url = CONFIG.FUNCTIONS_BASE + '/approve-booking?token=' + encodeURIComponent(token) + '&action=' + action;
    const res = await fetch(url, { method: 'GET' });

    // The edge function returns HTML for GET — check response status
    if (res.ok) {
      if (action === 'reject') {
        setDone('✅', 'Booking Rejected', 'The guest has been notified. Redirecting…');
      } else {
        setDone('✅', 'Booking Approved!', 'The guest has been emailed to confirm their stay. Redirecting…');
      }
    } else {
      const data = await res.text();
      setDone('❌', 'Something Went Wrong', 'Could not process. Please try again or contact support.');
      console.error('[APPROVE] Error:', data);
    }
  } catch (e) {
    setDone('❌', 'Connection Error', 'Please check your internet and try again.');
    console.error('[APPROVE] Fetch error:', e);
  }
})();
</script>
</body>
</html>
