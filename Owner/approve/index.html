<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing… — AfriStay</title>
  <link rel="icon" type="image/x-icon" href="/Pictures/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f2f0ec; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 48px 40px; max-width: 420px;
            width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .spinner { width: 52px; height: 52px; border: 4px solid #f0f0f0; border-top-color: #EB6753;
               border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 22px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon { font-size: 52px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 10px; }
    .msg   { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 16px; }
    .note  { font-size: 12px; color: #aaa; }
    .home-link { display: inline-block; margin-top: 18px; padding: 12px 28px;
                 background: #EB6753; color: #fff; border-radius: 12px;
                 text-decoration: none; font-weight: 700; font-size: 14px; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Processing…</div>
  <p class="msg" id="msg">Please wait a moment.</p>
</div>

<!-- Load config first, then Supabase CDN is not needed here — we just call the edge function -->
<script src="/js/config.js"></script>
<script>
(async function () {
  const p      = new URLSearchParams(window.location.search);
  const token  = p.get('token')  || '';
  const action = (p.get('action') || 'approve').toLowerCase(); // approve | reject

  const spinner = document.getElementById('spinner');
  const titleEl = document.getElementById('title');
  const msgEl   = document.getElementById('msg');

  function show(icon, title, msg, showHomeBtn) {
    spinner.style.display = 'none';
    const ic = document.createElement('div');
    ic.className = 'icon';
    ic.textContent = icon;
    document.getElementById('card').insertBefore(ic, titleEl);
    titleEl.textContent = title;
    msgEl.textContent   = msg;
    if (showHomeBtn) {
      const a = document.createElement('a');
      a.href = '/';
      a.className = 'home-link';
      a.textContent = 'Go to AfriStay';
      document.getElementById('card').appendChild(a);
    }
  }

  if (!token) {
    show('❌', 'Invalid Link', 'No token found. Please use the link from your email.', true);
    return;
  }

  try {
    // POST with token — no auth required, the token IS the auth
    const res  = await fetch(CONFIG.FUNCTIONS_BASE + '/approve-booking', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, action }),
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      show('❌', 'Could Not Process', data.error || 'Something went wrong. Please try again or contact support.', true);
      return;
    }

    if (action === 'reject') {
      show('✅', 'Booking Rejected', 'The guest has been notified by email.', true);
    } else {
      show('✅', 'Booking Approved!', 'The guest has been emailed to confirm their stay.', true);
    }

    // Redirect home after 3s
    setTimeout(() => window.location.replace('/'), 3000);

  } catch (e) {
    show('❌', 'Connection Error', 'Please check your internet and try again.', true);
    console.error('[APPROVE]', e);
  }
})();
</script>
</body>
</html>
