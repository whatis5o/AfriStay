<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Result — AfriStay</title>
<link rel="icon" type="image/x-icon" href="/Pictures/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--red:#EB6753;--green:#16a34a;--border:#e8e8e8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#f4f3f1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.card{max-width:520px;width:100%;background:#fff;border-radius:24px;box-shadow:0 4px 40px rgba(0,0,0,.1);padding:52px 36px;text-align:center}
.big-icon{font-size:72px;display:block;margin-bottom:20px}
.big-icon.success{color:var(--green);animation:pop .5s cubic-bezier(.175,.885,.32,1.275)}
.big-icon.pending{color:#f59e0b;animation:pulse 1.5s infinite}
.big-icon.fail{color:#ef4444}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h2{font-family:'Playfair Display',serif;font-size:28px;color:#161616;margin-bottom:10px}
.sub{font-size:15px;color:#888;margin-bottom:24px;line-height:1.7}
.ref-box{border-radius:12px;padding:14px 20px;font-size:13px;font-weight:700;margin-bottom:26px;line-height:1.8}
.ref-box.success{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#166534}
.ref-box.pending{background:#fffbeb;border:1.5px solid #fde68a;color:#92400e}
.ref-box.fail{background:#fff0f0;border:1.5px solid #fcc;color:#c0392b}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border:2px solid var(--red);color:var(--red);border-radius:12px;font-size:14px;font-weight:700;text-decoration:none;transition:all .2s;font-family:'Sora',sans-serif}
.btn:hover{background:var(--red);color:#fff}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
    <!-- Loading state -->
    <div class="spinner"></div>
    <h2 style="margin-top:16px">Checking payment…</h2>
    <p class="sub">Please wait while we confirm your payment status.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
/*
 * IremboPay redirects here: /Listings/Checkout/result/?booking_id=UUID
 * Legacy K-Pay:              /Listings/Checkout/result/?ref=REFID
 * Polls Supabase until webhook confirms payment (status=confirmed).
 */
const params     = new URLSearchParams(window.location.search);
const bookingId  = params.get('booking_id') || '';
const legacyRef  = params.get('ref') || '';
const card       = document.getElementById('card');
const sleep      = ms => new Promise(r => setTimeout(r, ms));

async function checkStatus() {
    if (!bookingId && !legacyRef) { showFail('Missing booking reference. Please contact support.'); return; }

    const sb = window.supabaseClient;
    if (!sb) { showFail('Connection error — please refresh.'); return; }

    // Poll up to 12 times (every 3s = 36s total)
    for (let attempt = 0; attempt < 12; attempt++) {
        let query = sb.from('bookings')
            .select('id, status, payment_status, total_amount, currency, booking_reference, guest_name, listings(title)');

        if (bookingId) {
            query = query.eq('id', bookingId);
        } else {
            query = query.eq('payment_reference', legacyRef);
        }

        const { data: bk } = await query.maybeSingle();

        if (!bk) {
            if (attempt < 4) { await sleep(3000); continue; }
            showFail('Booking not found. If you completed payment, contact support at <a href="mailto:support@afristay.rw" style="color:#EB6753;">support@afristay.rw</a>');
            return;
        }

        if (bk.payment_status === 'paid' || bk.status === 'confirmed') {
            showSuccess(bk); return;
        }

        if (bk.payment_status === 'failed' || bk.status === 'cancelled' || bk.status === 'rejected') {
            showFail('Payment was not completed or was cancelled. No charges were made.'); return;
        }

        // Still pending — update spinner text
        if (attempt > 2) {
            const msg = document.querySelector('#card p');
            if (msg) msg.textContent = 'Still checking… Mobile Money can take a moment.';
        }
        await sleep(3000);
    }

    // Timeout — payment still processing
    showPending(bookingId || legacyRef);
}

function showSuccess(bk) {
    const amt = Number(bk.total_amount || 0).toLocaleString('en-RW');
    const ref = bk.booking_reference || String(bk.id || '').slice(0, 8).toUpperCase();
    const listing = bk.listings?.title || 'your listing';
    card.innerHTML = `
        <i class="fa-solid fa-circle-check big-icon success"></i>
        <h2>Payment Confirmed!</h2>
        <p class="sub">Your booking for <strong>${listing}</strong> is confirmed. You'll receive a confirmation email shortly.</p>
        <div class="ref-box success">
            <i class="fa-solid fa-receipt" style="margin-right:6px"></i>
            Booking Ref: <strong>#${ref}</strong><br>
            Amount paid: <strong>${amt} RWF</strong>
        </div>
        <div class="btns">
            <a href="/Dashboards/Profile/?tab=bookings" class="btn"><i class="fa-solid fa-gauge"></i> My Bookings</a>
            <a href="/Listings" class="btn"><i class="fa-solid fa-magnifying-glass"></i> Browse More</a>
        </div>`;
    document.title = 'Booking Confirmed — AfriStay';
}

function showPending(ref) {
    card.innerHTML = `
        <i class="fa-solid fa-clock big-icon pending"></i>
        <h2>Payment Processing…</h2>
        <p class="sub">Your payment is being processed — this can take a few minutes for Mobile Money. Your booking will update automatically once confirmed.</p>
        <div class="ref-box pending">
            <i class="fa-solid fa-info-circle" style="margin-right:6px"></i>
            Reference: <strong>${ref}</strong><br>
            <small>Save this in case you need to contact support.</small>
        </div>
        <div class="btns">
            <a href="/Dashboards/Profile/?tab=bookings" class="btn"><i class="fa-solid fa-gauge"></i> Check My Bookings</a>
        </div>`;
    document.title = 'Payment Processing — AfriStay';
}

function showFail(msg) {
    card.innerHTML = `
        <i class="fa-solid fa-circle-xmark big-icon fail"></i>
        <h2>Payment Not Confirmed</h2>
        <p class="sub">${msg}</p>
        <div class="ref-box fail">
            <i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>
            No charges were made to your account.
        </div>
        <div class="btns">
            <a href="javascript:history.back()" class="btn"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
            <a href="/Listings" class="btn"><i class="fa-solid fa-magnifying-glass"></i> Browse Listings</a>
        </div>`;
    document.title = 'Payment Failed — AfriStay';
}

document.addEventListener('DOMContentLoaded', checkStatus);
</script>
<script src="/js/maintenance.js"></script>
    <script src="/js/scroll-animations.js"></script>
</body>
</html>
