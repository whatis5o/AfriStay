<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Your Stay — AfriStay</title>
  <link rel="icon" type="image/x-icon" href="/Pictures/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Load Supabase + config BEFORE body scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f2f0ec;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 24px; box-shadow: 0 8px 40px rgba(0,0,0,.10);
            width: 100%; max-width: 480px; overflow: hidden; }
    .header { background: linear-gradient(135deg,#16a34a,#15803d); padding: 32px 28px; color: #fff; text-align: center; }
    .header-icon { width: 68px; height: 68px; background: rgba(255,255,255,.2); border-radius: 50%;
                   display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 30px; }
    .header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .header p  { font-size: 13px; opacity: .85; }
    .body { padding: 28px; }
    .summary-row { display: flex; justify-content: space-between; align-items: flex-start;
                   padding: 10px 0; border-bottom: 1px solid #f3f3f3; font-size: 14px; }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .label { color: #999; }
    .summary-row .value { font-weight: 700; text-align: right; }
    .summary-row.total .label { font-size: 16px; font-weight: 800; color: #1a1a1a; }
    .summary-row.total .value { font-size: 22px; font-weight: 800; color: #16a34a; }
    .info-box { background: #fefce8; border: 1.5px solid #fde047; border-radius: 12px;
                padding: 14px 16px; font-size: 13px; color: #713f12; line-height: 1.7; margin: 18px 0; }
    .btn-confirm { width: 100%; padding: 18px; background: #16a34a; color: #fff; border: none;
                   border-radius: 14px; font-size: 17px; font-weight: 800; cursor: pointer;
                   transition: background .2s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-confirm:hover:not(:disabled) { background: #15803d; transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .error-box { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 11px;
                 padding: 12px 16px; font-size: 13px; color: #b91c1c; margin-top: 14px; display: none; }
    .success-state { text-align: center; padding: 40px 28px; }
    .success-icon { width: 80px; height: 80px; background: #dcfce7; border-radius: 50%;
                    display: inline-flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 18px; }
    .success-state h2 { font-size: 24px; font-weight: 800; color: #1a1a1a; margin-bottom: 10px; }
    .success-state p  { color: #666; font-size: 14px; line-height: 1.7; margin-bottom: 22px; }
    .btn-home { display: inline-block; padding: 14px 28px; background: #EB6753; color: #fff;
                border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 15px; }
    .logo { text-align: center; padding: 16px; font-size: 13px; color: #bbb; border-top: 1px solid #f3f3f3; }
    .logo a { color: #EB6753; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

<!-- LOADING STATE -->
<div class="card" id="mainCard">
  <div class="header">
    <div class="header-icon">🏠</div>
    <h1>Confirm Your Stay</h1>
    <p>Your host approved your booking request</p>
  </div>
  <div class="body" id="bookingBody">
    <div style="text-align:center;padding:28px;color:#999;font-size:14px">
      <i class="fa-solid fa-circle-notch fa-spin" style="font-size:28px;color:#EB6753;margin-bottom:14px;display:block"></i>
      Loading your booking…
    </div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="logo">AfriStay · <a href="/">afristay.rw</a></div>
</div>

<script>
(async function () {
  // CONFIG and supabase are already loaded in <head>
  const FUNCTIONS = CONFIG?.FUNCTIONS_BASE || '';

  const params    = new URLSearchParams(window.location.search);
  const bookingId = params.get('booking_id');
  const bodyEl    = document.getElementById('bookingBody');
  const errorEl   = document.getElementById('errorBox');

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmt(d) {
    try { return new Date(d + 'T00:00:00').toLocaleDateString('en-US',
      { weekday:'short', month:'short', day:'numeric', year:'numeric' }); }
    catch { return d || '—'; }
  }
  function fmtMoney(n, cur) {
    return Number(n).toLocaleString('en-RW') + ' ' + (cur || 'RWF');
  }
  function showError(msg) {
    errorEl.style.display = 'block';
    errorEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>' + esc(msg);
  }
  function showSuccess(guestEmail) {
    document.getElementById('mainCard').innerHTML = `
      <div class="success-state">
        <div class="success-icon">✅</div>
        <h2>Stay Confirmed!</h2>
        <p>Your booking is locked in. A confirmation email has been sent to <strong>${esc(guestEmail || 'your email')}</strong>.</p>
        <a href="/" class="btn-home"><i class="fa-solid fa-house"></i> Back to AfriStay</a>
      </div>
      <div class="logo">AfriStay · <a href="/">afristay.rw</a></div>`;
  }

  if (!bookingId) {
    bodyEl.innerHTML = '<div style="padding:20px;text-align:center;color:#e74c3c;font-size:14px"><i class="fa-solid fa-triangle-exclamation" style="font-size:28px;display:block;margin-bottom:10px"></i>Invalid link. Please use the link from your approval email.</div>';
    return;
  }

  // Load booking — no auth required, anyone with the link can view + confirm
  let booking, listing;
  try {
    const sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    const { data: b, error: bErr } = await sb
      .from('bookings')
      .select('id, status, guest_name, guest_email, guest_phone, start_date, end_date, total_amount, nights, booking_reference, listings(title, currency)')
      .eq('id', bookingId)
      .single();
    if (bErr || !b) throw new Error('Booking not found. Please check your link.');
    booking = b;
    listing = b.listings;
  } catch(e) {
    bodyEl.innerHTML = '<div style="padding:20px;text-align:center;color:#e74c3c;font-size:14px">' + esc(e.message) + '</div>';
    return;
  }

  // Handle edge states
  if (booking.status === 'confirmed') {
    bodyEl.innerHTML = '<div style="text-align:center;padding:28px"><div style="font-size:48px;margin-bottom:12px">✅</div><h3 style="font-size:18px;font-weight:800;margin-bottom:8px;color:#1a1a1a">Already Confirmed!</h3><p style="color:#666;font-size:14px">This booking is already confirmed. Check your email for details.</p><br><a href="/" style="color:#EB6753;font-weight:700;text-decoration:none">← Back to AfriStay</a></div>';
    return;
  }
  if (['rejected','cancelled'].includes(booking.status)) {
    bodyEl.innerHTML = '<div style="text-align:center;padding:28px"><div style="font-size:48px;margin-bottom:12px">❌</div><h3 style="font-size:18px;font-weight:800;margin-bottom:8px;color:#1a1a1a">Booking ' + booking.status + '</h3><p style="color:#666;font-size:14px">This booking is no longer active.</p><br><a href="/Listings" style="background:#EB6753;color:#fff;padding:10px 22px;border-radius:12px;text-decoration:none;font-weight:700">Browse Listings</a></div>';
    return;
  }
  if (booking.status !== 'approved') {
    bodyEl.innerHTML = '<div style="text-align:center;padding:28px"><div style="font-size:48px;margin-bottom:12px">⏳</div><h3 style="font-size:18px;font-weight:800;margin-bottom:8px;color:#1a1a1a">Not Ready Yet</h3><p style="color:#666;font-size:14px">This booking is still awaiting host approval. You\'ll get an email when the host responds.</p></div>';
    return;
  }

  // Show confirm UI
  const nights = booking.nights || Math.ceil(
    (new Date(booking.end_date + 'T00:00:00') - new Date(booking.start_date + 'T00:00:00')) / 86400000
  ) || 1;
  const cur = listing?.currency || 'RWF';

  bodyEl.innerHTML = `
    <p style="color:#555;font-size:15px;margin-bottom:20px">
      Hi <strong>${esc(booking.guest_name || 'Guest')}</strong>,
      your host approved your request. Click below to confirm your stay.
    </p>
    <div style="background:#f9fafb;border-radius:14px;padding:18px;margin-bottom:18px;border:1px solid #eee">
      <div class="summary-row"><span class="label">Property</span><span class="value">${esc(listing?.title || 'Listing')}</span></div>
      <div class="summary-row"><span class="label">Check-in</span><span class="value">${fmt(booking.start_date)}</span></div>
      <div class="summary-row"><span class="label">Check-out</span><span class="value">${fmt(booking.end_date)}</span></div>
      <div class="summary-row"><span class="label">Duration</span><span class="value">${nights} night${nights !== 1 ? 's' : ''}</span></div>
      ${booking.booking_reference ? `<div class="summary-row"><span class="label">Booking Ref</span><span class="value" style="font-family:monospace;color:#EB6753;font-size:13px">${esc(booking.booking_reference)}</span></div>` : ''}
      <div class="summary-row total"><span class="label">Total</span><span class="value">${fmtMoney(booking.total_amount, cur)}</span></div>
    </div>
    <div class="info-box">
      📌 By confirming, you agree to the host's house rules and AfriStay's Terms & Conditions.
      Payment will be collected directly by the host.
    </div>
    <button class="btn-confirm" id="confirmBtn" onclick="doConfirm()">
      <i class="fa-solid fa-circle-check"></i> Confirm My Stay
    </button>`;

  window.doConfirm = async function () {
    const btn = document.getElementById('confirmBtn');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Confirming…';
    errorEl.style.display = 'none';

    try {
      const res  = await fetch(FUNCTIONS + '/confirm-booking', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ booking_id: bookingId }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Could not confirm booking');
      showSuccess(booking.guest_email);
    } catch(e) {
      showError(e.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Confirm My Stay';
    }
  };
})();
</script>
</body>
</html>
